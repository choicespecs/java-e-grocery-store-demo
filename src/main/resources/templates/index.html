<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Fresh Groceries</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-success px-4 mb-4">
    <a class="navbar-brand fw-bold" href="/">🛒 Fresh Groceries</a>
    <div class="d-flex gap-2">
        <a href="/cart" class="btn btn-outline-light">
            Cart <span class="badge bg-warning text-dark" th:text="${cartItemCount}">0</span>
        </a>
        <a href="/demo" class="btn btn-warning btn-sm fw-bold align-self-center">⚡ Demo</a>
    </div>
</nav>

<div class="container">

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible" th:text="${success}"></div>
    <div th:if="${warning}" class="alert alert-warning alert-dismissible" th:text="${warning}"></div>
    <div th:if="${error}"   class="alert alert-danger  alert-dismissible" th:text="${error}"></div>

    <!-- Category filter -->
    <div class="mb-4">
        <a th:href="@{/}" th:classappend="${selectedCategory == null} ? 'active' : ''"
           class="btn btn-outline-success me-2 mb-2">All</a>
        <a th:each="cat : ${categories}"
           th:href="@{/(category=${cat.name})}"
           th:text="${cat.name}"
           th:classappend="${selectedCategory == cat.name} ? 'active' : ''"
           class="btn btn-outline-success me-2 mb-2">Category</a>
    </div>

    <!-- Product grid -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="col" th:each="product : ${products}"
             th:with="effectiveStock=${product.stockQuantity - (cartQtyMap[product.id] ?: 0)}">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title" th:text="${product.name}">Product Name</h6>
                    <p class="card-text text-muted small" th:text="${product.category.name}">Category</p>
                    <p class="card-text fw-bold text-success fs-5" th:text="'$' + ${product.price}">$0.00</p>

                    <!-- Stock badges -->
                    <div class="mb-2">
                        <span th:if="${effectiveStock <= 0}" class="badge bg-secondary">Out of Stock</span>
                        <span th:if="${effectiveStock > 0 and effectiveStock <= 5}" class="badge bg-warning text-dark"
                              th:text="|${effectiveStock} left|">Low Stock</span>
                        <span th:if="${cartDeals[product.name] != null and product.stockQuantity >= cartDeals[product.name].minQuantity}"
                              class="badge bg-success-subtle text-success-emphasis border border-success-subtle"
                              th:text="'🏷 ' + ${cartDeals[product.name].description}">Deal</span>
                    </div>

                    <!-- Add to cart form -->
                    <form th:action="@{/cart/add}" method="post" class="mt-auto">
                        <input type="hidden" name="productId" th:value="${product.id}"/>
                        <div class="input-group input-group-sm mb-2">
                            <input th:if="${effectiveStock > 0}" type="number" name="quantity" value="1" min="1"
                                   th:max="${effectiveStock}"
                                   class="form-control" style="max-width:70px"/>
                            <button class="btn btn-success" type="submit"
                                    th:classappend="${effectiveStock <= 0} ? 'w-100 disabled' : ''"
                                    th:disabled="${effectiveStock <= 0}">Add to Cart</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
