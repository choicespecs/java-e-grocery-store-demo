<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Order Confirmed – Fresh Groceries</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-success px-4 mb-4">
    <a class="navbar-brand fw-bold" href="/">🛒 Fresh Groceries</a>
    <div class="d-flex gap-2">
        <a href="/cart" class="btn btn-outline-light">
            Cart <span class="badge bg-warning text-dark" th:text="${cartItemCount}">0</span>
        </a>
        <a href="/demo" class="btn btn-warning btn-sm fw-bold align-self-center">⚡ Demo</a>
    </div>
</nav>

<div class="container" style="max-width:620px">
    <div class="text-center mb-4">
        <div class="display-1">✅</div>
        <h2 class="mt-2">Order Confirmed!</h2>
        <p class="text-muted">Thank you for your purchase.</p>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-success text-white fw-bold">
            Order #<span th:text="${order.id}">0</span>
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item d-flex justify-content-between small"
                th:each="item : ${order.items}">
                <span th:text="${item.productName} + ' × ' + ${item.quantity}">Item × 1</span>
                <span th:text="'$' + ${#numbers.formatDecimal(item.lineTotal, 1, 2)}">$0.00</span>
            </li>
        </ul>
        <div class="card-footer">
            <div class="d-flex justify-content-between">
                <span class="text-muted">Subtotal</span>
                <span th:text="'$' + ${#numbers.formatDecimal(order.subtotal, 1, 2)}">$0.00</span>
            </div>
            <div th:if="${order.hasDiscount()}" class="d-flex justify-content-between text-success">
                <span>Promo (<span th:text="${order.promoCode}">CODE</span>)</span>
                <span th:text="'−$' + ${#numbers.formatDecimal(order.discount, 1, 2)}">−$0.00</span>
            </div>
            <div class="d-flex justify-content-between fw-bold border-top mt-2 pt-2">
                <span>Total Charged</span>
                <span th:text="'$' + ${#numbers.formatDecimal(order.total, 1, 2)}">$0.00</span>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body small text-muted">
            <strong>Payment reference:</strong> <code th:text="${order.paymentToken}">PAY-XXXXXXXX</code><br/>
            <strong>Placed at:</strong> <span th:text="${order.createdAt}"></span><br/>
            <strong>Status:</strong> <span class="text-success fw-semibold" th:text="${order.status}">CONFIRMED</span>
        </div>
    </div>

    <div class="text-center">
        <a href="/" class="btn btn-success px-5">Continue Shopping</a>
    </div>
</div>
</body>
</html>
