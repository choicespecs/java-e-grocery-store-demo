<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Error – Fresh Groceries</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-success px-4 mb-4">
    <a class="navbar-brand fw-bold" href="/">🛒 Fresh Groceries</a>
</nav>
<div class="container text-center" style="max-width:500px; margin-top:80px">
    <h2 class="text-danger">Something went wrong</h2>
    <p class="text-muted" th:text="${message ?: 'An unexpected error occurred.'}">Error details</p>
    <p class="text-muted small">Status: <span th:text="${status}">500</span></p>
    <a href="/" class="btn btn-success mt-3">Back to Store</a>
</div>
</body>
</html>
